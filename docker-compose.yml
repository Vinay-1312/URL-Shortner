version: "3.9"

networks:
  url-net:
    driver: bridge

volumes:
  mongo-data:
  redis-data:
  postgres-data:
  rabbitmq-data:

services:

  # ─── Infrastructure ───────────────────────────────────────────────

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: urlshortener
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - url-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - url-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    networks:
      - url-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analyticspass
      POSTGRES_DB: analytics
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - url-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Application Services ─────────────────────────────────────────

  creation-service:
    build:
      context: ./services/creation-service
      dockerfile: Dockerfile
    container_name: creation-service
    restart: unless-stopped
    environment:
      PORT: "8080"
      MONGO_URI: mongodb://root:rootpassword@mongodb:27017/urlshortener?authSource=admin
      REDIS_ADDR: redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - url-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  redirect-service:
    build:
      context: ./services/redirect-service
      dockerfile: Dockerfile
    container_name: redirect-service
    restart: unless-stopped
    environment:
      PORT: "8081"
      MONGO_URI: mongodb://root:rootpassword@mongodb:27017/urlshortener?authSource=admin
      REDIS_ADDR: redis:6379
      RABBITMQ_URI: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - url-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    container_name: analytics-service
    restart: unless-stopped
    environment:
      PORT: "8082"
      RABBITMQ_URI: amqp://guest:guest@rabbitmq:5672/
      POSTGRES_URI: postgres://analytics:analyticspass@postgres:5432/analytics?sslmode=disable
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - url-net

  # ─── Kong API Gateway ─────────────────────────────────────────────

  kong:
    image: kong:3.6-ubuntu
    container_name: kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "8000:8000"   # Kong proxy (public-facing)
      - "8001:8001"   # Kong admin API
    depends_on:
      creation-service:
        condition: service_healthy
      redirect-service:
        condition: service_healthy
    networks:
      - url-net
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── Frontend ─────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - kong
    networks:
      - url-net
